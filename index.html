<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f3ed" />
  <title>Academy Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/console.css?v=13" />
</head>
<body>
  <!-- operator sign-in -->
  <div class="gate" id="gate">
    <form class="gate-card" id="gateForm">
      <div class="wm"><span class="lg"><span class="mi fill">school</span></span>Academy Manager</div>
      <p>Operator console. Account-level metrics only — member data stays inside each academy.</p>
      <!-- prefilled DUMMY credentials — remove the value attributes when real accounts land -->
      <label><span>Email</span><input type="email" name="email" required value="operator@academymanager.in" placeholder="you@academymanager.in" /></label>
      <label><span>Password</span><input type="password" name="password" required value="123456" placeholder="••••••••" /></label>
      <button type="submit">Sign in</button>
    </form>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      "use strict";

      /* ============ platform DB (anon key; RLS-gated) ============ */
      var PROJECT = "https://ugsklcipzyiogxynshnh.supabase.co";
      var BASE = PROJECT + "/rest/v1";
      var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnc2tsY2lwenlpb2d4eW5zaG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTUyMzksImV4cCI6MjA5ODQ3MTIzOX0.w7xkjdTkYN2qA0oxMKLUNtua0ScKVHKQzfEyIayh9eo";
      var COURTSYNC_URL = "https://sujittarun.github.io/CourtSync/";

      function amSession() { try { return JSON.parse(localStorage.getItem("am-session")); } catch (e) { return null; } }
      function bearerTok() {
        var s = amSession();
        if (!s || !s.access_token) return Promise.resolve(KEY);
        if (s.expires_at - Date.now() > 90 * 1000) return Promise.resolve(s.access_token);
        return fetch(PROJECT + "/auth/v1/token?grant_type=refresh_token", {
          method: "POST", headers: { apikey: KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ refresh_token: s.refresh_token }),
        }).then(function (r) { return r.json(); }).then(function (j) {
          if (!j.access_token) throw new Error("expired");
          s.access_token = j.access_token; s.refresh_token = j.refresh_token;
          s.expires_at = Date.now() + (j.expires_in || 3600) * 1000;
          localStorage.setItem("am-session", JSON.stringify(s));
          return s.access_token;
        }).catch(function () { localStorage.removeItem("am-session"); return KEY; });
      }
      function get(path) {
        return bearerTok().then(function (tok) { return fetch(BASE + path, { headers: { apikey: KEY, Authorization: "Bearer " + tok } }); })
          .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); }).catch(function () { return []; });
      }
      function rpc(name, args) {
        return bearerTok().then(function (tok) {
          return fetch(BASE + "/rpc/" + name, { method: "POST", headers: { apikey: KEY, Authorization: "Bearer " + tok, "Content-Type": "application/json" }, body: JSON.stringify(args || {}) });
        }).then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); }).catch(function () { return null; });
      }

      /* ============ sign-in gate ============ */
      var gate = document.getElementById("gate");
      var s0 = amSession();
      if (s0 && !s0.access_token) { localStorage.removeItem("am-session"); s0 = null; }
      if (s0) gate.classList.add("hide");
      document.getElementById("gateForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var fd = new FormData(this);
        fetch(PROJECT + "/auth/v1/token?grant_type=password", {
          method: "POST", headers: { apikey: KEY, "Content-Type": "application/json" },
          body: JSON.stringify({ email: fd.get("email"), password: fd.get("password") }),
        }).then(function (r) { return r.json(); }).then(function (j) {
          var meta = (j.user && j.user.app_metadata) || {};
          if (j.access_token && meta.am_role === "operator") {
            localStorage.setItem("am-session", JSON.stringify({ access_token: j.access_token, refresh_token: j.refresh_token, expires_at: Date.now() + (j.expires_in || 3600) * 1000, email: j.user.email, role: "operator" }));
            gate.classList.add("hide"); location.reload(); return;
          }
          throw new Error(j.access_token ? "not an operator account" : (j.error_description || "wrong credentials"));
        }).catch(function (err) { alert("Sign-in failed: " + err.message); });
      });

      /* ============ helpers ============ */
      function iso(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
      function daysAgo(n) { var d = new Date(); d.setDate(d.getDate() - n); return iso(d); }
      function inr(n) { return "₹" + Number(n || 0).toLocaleString("en-IN"); }
      function inrK(n) { n = Number(n || 0); if (n >= 1e5) { var l = n / 1e5; return "₹" + (l >= 10 ? l.toFixed(1) : l.toFixed(2)) + "L"; } if (n >= 1000) return "₹" + Math.round(n / 1000) + "k"; return "₹" + n; }
      function num(n) { return Number(n || 0).toLocaleString("en-IN"); }
      function fmtDate(s) { try { return new Date(s).toLocaleDateString("en-IN", { day: "numeric", month: "short" }); } catch (e) { return "—"; } }
      function agoH(h) { if (h == null) return "Never"; if (h < 1) return "Just now"; if (h < 24) return Math.round(h) + "h ago"; return Math.round(h / 24) + "d ago"; }
      var esc = function (s) { var d = document.createElement("i"); d.textContent = String(s == null ? "" : s); return d.innerHTML; };

      var CH = { Website: "#6366f1", Playo: "#10b981", Hudle: "#f59e0b", District: "#3b82f6", "Walk-in": "#94a3b8" };
      function sportIcon(sport) { return ({ Tennis: "sports_tennis", Cricket: "sports_cricket", Football: "sports_soccer", Badminton: "sports_tennis", Swimming: "pool", "Multi-sport": "exercise" })[sport] || "exercise"; }
      function tint(sport) { return ({ Tennis: ["#0f766e", "#f0fdfa"], Cricket: ["#b45309", "#fffbeb"], Badminton: ["#7c3aed", "#f5f3ff"], Football: ["#1d4ed8", "#eff6ff"], "Multi-sport": ["#be123c", "#fff1f2"], Swimming: ["#0369a1", "#f0f9ff"] })[sport] || ["#4b5563", "#f3f4f6"]; }
      function healthStyle(h) { return ({ Active: ["#047857", "#ecfdf5"], Quiet: ["#b45309", "#fffbeb"], "At risk": ["#b91c1c", "#fef2f2"], Onboarding: ["#4338ca", "#eef2ff"] })[h] || ["#475569", "#f1f5f9"]; }
      function billStyle(b) { return ({ paid: ["#047857", "#ecfdf5", "Paid"], pending: ["#b45309", "#fffbeb", "Pending"], overdue: ["#b91c1c", "#fef2f2", "Overdue"] })[b] || ["#b45309", "#fffbeb", "Pending"]; }

      function bars(vals, h, gap) {
        var max = Math.max.apply(null, vals.concat([1]));
        return '<div style="display:flex;align-items:flex-end;gap:' + (gap || 2) + 'px;height:' + h + 'px;width:100%">' +
          vals.map(function (v) { return '<div style="flex:1;min-height:2px;height:' + Math.max(6, Math.round(v / max * 100)) + '%;background:' + (v ? "var(--ac)" : "#eceef2") + ';border-radius:2px 2px 0 0"></div>'; }).join("") + "</div>";
      }
      // premium area+line sparkline (responsive width, crisp non-scaling stroke)
      var _sgn = 0;
      function spark(vals, h, color, draw) {
        color = color || "var(--ac)";
        vals = (vals || []).map(Number);
        if (!vals.length) vals = [0, 0];
        if (vals.length === 1) vals = [vals[0], vals[0]];
        var allZero = vals.every(function (v) { return !v; });
        var max = Math.max.apply(null, vals), min = Math.min.apply(null, vals);
        var n = vals.length, W = 100, P = 3, ih = h - P * 2;
        function y(v) { var t = max === min ? 0.5 : (v - min) / (max - min); return (P + (1 - t) * ih).toFixed(2); }
        var pts = vals.map(function (v, i) { return (i / (n - 1) * W).toFixed(2) + " " + y(v); });
        if (allZero) { // flat baseline so an idle academy still reads as a line, not empty
          return '<svg class="spark" viewBox="0 0 ' + W + " " + h + '" preserveAspectRatio="none" style="height:' + h + 'px">' +
            '<path d="M0 ' + (h - P) + " L" + W + " " + (h - P) + '" style="stroke:#e2e5ea;stroke-width:1.4" vector-effect="non-scaling-stroke" fill="none"/></svg>';
        }
        var line = "M" + pts.join(" L");
        var area = "M0 " + h + " L" + pts.join(" L") + " L" + W + " " + h + " Z";
        var gid = "sg" + (++_sgn);
        return '<svg class="spark" viewBox="0 0 ' + W + " " + h + '" preserveAspectRatio="none" style="height:' + h + 'px;--len:210">' +
          '<defs><linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="' + color + '" stop-opacity=".24"/><stop offset="1" stop-color="' + color + '" stop-opacity="0"/></linearGradient></defs>' +
          '<path d="' + area + '" fill="url(#' + gid + ')"/>' +
          '<path class="ln' + (draw ? " draw" : "") + '" d="' + line + '" style="stroke:' + color + '" vector-effect="non-scaling-stroke"/></svg>';
      }
      function mixBar(mix, h) {
        var keys = Object.keys(mix).sort(function (x, y) { return mix[y] - mix[x]; });
        var total = keys.reduce(function (s, k) { return s + mix[k]; }, 0) || 1;
        if (!keys.length) return '<div style="height:' + h + 'px;border-radius:' + (h / 2) + 'px;background:#eceef2"></div>';
        return '<div style="display:flex;height:' + h + 'px;border-radius:' + (h / 2) + 'px;overflow:hidden;gap:2px">' +
          keys.map(function (k) { return '<div style="width:' + (mix[k] / total * 100) + '%;background:' + (CH[k] || "#b9b7ac") + '"></div>'; }).join("") + "</div>";
      }
      function pill(text, colors, small) {
        var p = small ? "3px 8px 3px 7px" : "3px 10px 3px 8px", fs = small ? "11px" : "11.5px", dot = small ? 5 : 6;
        return '<span style="display:inline-flex;align-items:center;gap:6px;font-size:' + fs + ';font-weight:600;padding:' + p + ';border-radius:20px;background:' + colors[1] + ';color:' + colors[0] + ';white-space:nowrap"><span style="width:' + dot + 'px;height:' + dot + 'px;border-radius:50%;background:' + colors[0] + '"></span>' + esc(text) + "</span>";
      }

      /* ============ state + data ============ */
      var state = { view: "overview", sel: null, sortKey: "gmv", sortDir: "desc", data: [], health: null, loaded: false };

      function usageArray(byDay) { var out = []; for (var i = 13; i >= 0; i--) out.push((byDay || {})[daysAgo(i)] || 0); return out; }
      function normWeekly(w) { w = (w || []).slice(-8); while (w.length < 8) w.unshift(0); return w; }
      function mapAccount(r) {
        var cfg = r.config || {}, lastAt = r.last_event_at || null;
        var lastH = lastAt ? (Date.now() - new Date(lastAt)) / 36e5 : null;
        var health = !lastAt ? "Onboarding" : lastH <= 48 ? "Active" : lastH <= 14 * 24 ? "Quiet" : "At risk";
        var renewsPast = r.renews_on && new Date(r.renews_on) < new Date();
        var st = r.sub_status || "";
        var bill = (st === "overdue" || renewsPast) ? "overdue" : (st === "active" || st === "paid") ? "paid" : "pending";
        return {
          id: r.tenant_id, name: r.name, sport: cfg.sport || "Multi-sport", icon: sportIcon(cfg.sport), city: cfg.city || "",
          owner: cfg.owner || "", plan: r.plan || r.tier || "Starter", mrr: r.mrr || 0, health: health,
          gmv: r.gmv_30d || 0, prev: r.gmv_prev || 0, bookings: r.bookings_30d || 0, enq: r.apps_30d || 0,
          players: r.active_players || 0, cap: r.player_cap || 0, sessions: r.sessions_30d || 0, activeDays: r.active_days_30d || 0,
          lastH: lastH, bill: bill, renews: bill === "overdue" ? "Overdue" : (r.renews_on ? fmtDate(r.renews_on) : "—"),
          method: cfg.billing ? "UPI · Autopay" : "—", msgs: r.msgs_30d || 0, msgCost: r.msg_cost_30d || 0,
          errors: r.errors_30d || 0, ver: r.app_ver || "—", totalBk: r.total_bookings || 0, wkday: r.weekday_bookings || 0,
          wkend: r.weekend_bookings || 0, courtRev: r.booker_rev_90d || 0, bookers: r.contacts_count || 0,
          tenant: !!cfg.url, tenantUrl: cfg.url || "", mix: r.channel_mix || {}, weekly: normWeekly(r.weekly_gmv), usage: usageArray(r.usage_daily), sub: cfg.sport + " · " + (cfg.city || ""),
        };
      }
      function sortedData() {
        var k = state.sortKey, dir = state.sortDir === "asc" ? 1 : -1, hr = { Active: 4, Quiet: 3, "At risk": 2, Onboarding: 1 };
        return state.data.slice().sort(function (a, b) {
          if (k === "name") return a.name < b.name ? -dir : a.name > b.name ? dir : 0;
          var va, vb;
          if (k === "health") { va = hr[a.health]; vb = hr[b.health]; }
          else if (k === "ago") { va = a.lastH == null ? 1e9 : a.lastH; vb = b.lastH == null ? 1e9 : b.lastH; }
          else { va = a[k] || 0; vb = b[k] || 0; }
          return (va - vb) * dir;
        });
      }

      /* ============ render ============ */
      var root = document.getElementById("root");

      function navBtn(key, label, icon, badge, active) {
        return '<button class="nav-item' + (active ? " active" : "") + '" data-nav="' + key + '"><span class="mi" style="font-size:20px">' + icon + "</span><span>" + label + '</span><span style="flex:1"></span>' +
          (badge ? '<span style="font-size:11px;font-weight:600;background:#fef2f2;color:#dc2626;padding:1px 7px;border-radius:20px">' + badge + "</span>" : "") + "</button>";
      }

      function render() {
        var accts = state.data, isDetail = !!state.sel, view = state.view;
        var sel = isDetail ? accts.filter(function (a) { return a.id === state.sel; })[0] : null;
        var overdue = accts.filter(function (a) { return a.bill === "overdue"; }).length;
        var pendingC = accts.filter(function (a) { return a.bill === "pending"; }).length;
        var billBadge = (overdue + pendingC) || "";

        var titles = { overview: ["Portfolio insight", "A live view of revenue, adoption and academy health"], academies: ["Academies", accts.length + " client academies on the platform"], billing: ["Billing", "Subscriptions, invoices & collections"], growth: ["Growth", "Adoption, enquiries & channel performance"], settings: ["Settings", "Organization & console configuration"] };
        var pageTitle = isDetail ? (sel ? sel.name : "") : titles[view][0];
        var pageSub = isDetail ? (sel ? sel.sub : "") : titles[view][1];

        // sidebar sync-engine card from platform_health
        var h = state.health || {};
        var dead = (h.dead_letters || []).length, gaps = h.gap_count || 0, stale = (h.stale_integrations || []).length;
        var pend = (h.jobs && h.jobs.pending) || 0, oldest = (h.jobs && h.jobs.oldest_pending_mins) || 0;
        var engineBad = dead || gaps || (pend && oldest > 30);
        var engineDot = engineBad ? "#d97706" : "#16a34a", engineRing = engineBad ? "#fef3c7" : "#dcfce7";
        var engineLabel = engineBad ? "Degraded" : "Operational";
        var engineStat = engineBad ? ((gaps || dead || pend) + " to clear") : "99.9%";

        var body =
          (state.loaded && !accts.length ? emptyPortfolio() :
            isDetail ? detailView(sel) :
            view === "overview" ? overviewView(accts, overdue, pendingC) :
            view === "academies" ? academiesView(accts) :
            view === "billing" ? billingView(accts) :
            view === "growth" ? growthView(accts) :
            settingsView());

        root.innerHTML =
          '<div class="app">' +
            '<div class="am-backdrop" data-menu></div>' +
            // sidebar
            '<aside class="am-side">' +
              '<div class="am-brand">' +
                '<div class="am-mark"><span class="mi fill">school</span></div>' +
                '<div style="min-width:0"><div class="am-wordmark">Academy Manager</div><div class="am-edition">OPERATOR SUITE</div></div>' +
              "</div>" +
              '<nav style="display:flex;flex-direction:column;gap:3px;margin-top:4px">' +
                navBtn("overview", "Insight", "space_dashboard", "", view === "overview" && !isDetail) +
                navBtn("academies", "Academies", "apartment", "", view === "academies" && !isDetail) +
                navBtn("billing", "Billing", "receipt_long", billBadge, view === "billing" && !isDetail) +
                navBtn("growth", "Growth", "trending_up", "", view === "growth" && !isDetail) +
                navBtn("settings", "Settings", "settings", "", view === "settings" && !isDetail) +
              "</nav>" +
              '<div style="flex:1"></div>' +
              '<div style="border:1px solid var(--bd2);border-radius:12px;padding:12px;background:var(--fill)">' +
                '<div style="font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:0.03em">SYNC ENGINE</div>' +
                '<div style="display:flex;align-items:center;gap:8px;margin-top:9px"><span style="width:8px;height:8px;border-radius:50%;background:' + engineDot + ';box-shadow:0 0 0 3px ' + engineRing + '"></span><span style="font-size:12.5px;font-weight:600">' + engineLabel + '</span><span style="flex:1"></span><span style="font-size:11.5px;color:var(--tx3)">' + engineStat + "</span></div>" +
              "</div>" +
              '<div style="display:flex;align-items:center;gap:10px;padding:12px 6px 2px;margin-top:8px;border-top:1px solid var(--bd2)">' +
                '<div style="width:34px;height:34px;border-radius:50%;background:var(--acs);color:var(--act);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex:none">RK</div>' +
                '<div style="min-width:0;flex:1"><div style="font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Operator</div><div style="font-size:11px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">operator@academymanager.in</div></div>' +
                '<span class="mi" data-signout style="font-size:18px;color:var(--tx5);cursor:pointer" title="Sign out">logout</span>' +
              "</div>" +
            "</aside>" +
            // main
            '<main class="am-main">' +
              '<header class="am-top">' +
                '<button class="am-burger am-showm" data-menu aria-label="Menu"><span class="mi">menu</span></button>' +
                (isDetail ? '<button class="btn-g" data-back style="display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--bd-btn);border-radius:8px;padding:6px 11px 6px 8px;cursor:pointer;font:inherit;font-size:12.5px;font-weight:500;color:#5b6470"><span class="mi" style="font-size:18px">arrow_back</span>Portfolio</button>' : "") +
                '<div style="min-width:0"><h1 style="font-size:17px;font-weight:700;letter-spacing:-0.015em;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(pageTitle) + '</h1><div style="font-size:12.5px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(pageSub) + "</div></div>" +
                '<div style="flex:1"></div>' +
                '<div class="am-search" style="display:flex;align-items:center;gap:8px;background:var(--page);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;width:230px;color:var(--tx3)"><span class="mi" style="font-size:18px">search</span><span style="font-size:13px">Search academies…</span><span style="flex:1"></span><span style="font-size:11px;font-weight:600;border:1px solid #dde0e5;border-radius:5px;padding:0 5px;background:#fff">⌘K</span></div>' +
                '<span class="am-prod" style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#0f766e;background:#f0fdfa;border:1px solid #ccfbf1;border-radius:20px;padding:5px 11px 5px 9px"><span style="width:6px;height:6px;border-radius:50%;background:#14b8a6"></span>Production</span>' +
                '<button class="notif" style="width:38px;height:38px;border-radius:9px;border:1px solid var(--bd);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative"><span class="mi" style="font-size:20px;color:#5b6470">notifications</span>' + (engineBad || overdue ? '<span style="position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:#f43f5e;border:1.5px solid #fff"></span>' : "") + "</button>" +
              "</header>" +
              '<div class="am-scroll" id="amScroll"><div class="view">' + body + "</div></div>" +
            "</main>" +
          "</div>";
      }

      function kpiCard(icon, value, label, sub, trend, trendColor, trendIcon) {
        return '<div class="kpi">' +
          '<div style="display:flex;align-items:center;justify-content:space-between">' +
            '<div class="kpi-ic"><span class="mi">' + icon + "</span></div>" +
            (trend ? '<span class="trend" style="color:' + trendColor + '"><span class="mi">' + trendIcon + "</span>" + trend + "</span>" : "") +
          "</div>" +
          '<div class="kpi-num">' + value + "</div>" +
          '<div class="kpi-label">' + label + "</div>" +
          '<div class="kpi-sub">' + sub + "</div></div>";
      }

      function performanceChart(vals) {
        vals = (vals || []).map(Number);
        while (vals.length < 8) vals.unshift(0);
        var W = 920, H = 220, L = 48, R = 18, T = 20, B = 34;
        var max = Math.max.apply(null, vals.concat([1]));
        var top = max * 1.18;
        function x(i) { return L + i * ((W - L - R) / (vals.length - 1)); }
        function y(v) { return T + (1 - v / top) * (H - T - B); }
        var pts = vals.map(function (v, i) { return x(i).toFixed(1) + " " + y(v).toFixed(1); });
        var line = "M" + pts.join(" L");
        var area = line + " L" + x(vals.length - 1).toFixed(1) + " " + (H - B) + " L" + L + " " + (H - B) + " Z";
        var grid = [0, .33, .66, 1].map(function (p) {
          var gy = T + p * (H - T - B), value = top * (1 - p);
          return '<line x1="' + L + '" y1="' + gy + '" x2="' + (W - R) + '" y2="' + gy + '" class="perf-grid"/>' +

        return '<div style="max-width:720px;margin:0 auto"><div style="background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:26px;box-shadow:0 1px 2px rgba(16,24,40,.04)"><h3 style="font-size:15px;font-weight:700;letter-spacing:-0.01em">Organization</h3><div style="margin-top:14px">' + rows + "</div></div></div>";
      }

      function emptyPortfolio() {
        return '<div style="background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:48px 32px;text-align:center;box-shadow:0 1px 2px rgba(16,24,40,.04)"><div style="width:60px;height:60px;border-radius:16px;background:var(--acs);display:flex;align-items:center;justify-content:center;margin:0 auto"><span class="mi" style="font-size:32px;color:var(--act)">apartment</span></div><h3 style="font-size:17px;font-weight:700;margin-top:18px">No academies yet</h3><p style="font-size:13.5px;color:var(--tx3);max-width:400px;margin:8px auto 0;line-height:1.55">Onboard your first client academy and its account metrics will appear here.</p></div>';
      }

      function detailView(a) {
        if (!a) return "";
        var t = tint(a.sport), hs = healthStyle(a.health), bs = billStyle(a.bill), ac = "var(--act)";
        var pct = a.prev ? Math.round((a.gmv - a.prev) / a.prev * 100) : 0, up = pct >= 0;
        var over = a.cap && a.players > a.cap, nearCap = a.cap && a.players >= a.cap * 0.9;
        var header = '<div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:22px"><div style="width:56px;height:56px;border-radius:15px;background:' + t[1] + ';display:flex;align-items:center;justify-content:center;flex:none"><span class="mi" style="font-size:30px;color:' + t[0] + '">' + a.icon + '</span></div><div style="min-width:0;flex:1"><div style="display:flex;align-items:center;gap:11px;flex-wrap:wrap"><h2 style="font-size:20px;font-weight:700;letter-spacing:-0.02em">' + esc(a.name) + "</h2>" + pill(a.health, hs) + '</div><div style="font-size:13px;color:var(--tx3);margin-top:3px">' + esc(a.sub) + (a.owner ? " · Owner " + esc(a.owner) : "") + "</div></div>" +
          (a.tenant ? '<a class="btn-g" href="' + esc(a.tenantUrl) + '" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--bd-btn);border-radius:9px;padding:9px 14px;font:inherit;font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;flex:none;text-decoration:none">Open tenant console<span class="mi" style="font-size:17px">open_in_new</span></a>' : "") + "</div>";

        if (a.health === "Onboarding") {
          var check = [["Account created & subscription active", "check_circle", "#16a34a", "#4b5563"], ["Branded app configured", a.tenant ? "check_circle" : "pending", a.tenant ? "#16a34a" : "#d97706", "#4b5563"], ["Courts & batches being set up", "pending", "#d97706", "#4b5563"], ["First booking pending", "radio_button_unchecked", "#c7ccd4", "#9aa1ad"]].map(function (c) { return '<div style="display:flex;align-items:center;gap:11px"><span class="mi fill" style="font-size:20px;color:' + c[2] + '">' + c[1] + '</span><span style="font-size:13px;font-weight:500;color:' + c[3] + '">' + c[0] + "</span></div>"; }).join("");
          return header + '<div style="background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:48px 32px;text-align:center;box-shadow:0 1px 2px rgba(16,24,40,.04)"><div style="width:60px;height:60px;border-radius:16px;background:var(--acs);display:flex;align-items:center;justify-content:center;margin:0 auto"><span class="mi" style="font-size:32px;color:var(--act)">rocket_launch</span></div><h3 style="font-size:17px;font-weight:700;margin-top:18px;letter-spacing:-0.01em">Onboarding in progress</h3><p style="font-size:13.5px;color:var(--tx3);max-width:400px;margin:8px auto 0;line-height:1.55">' + esc(a.name) + " hasn't processed any bookings yet. Metrics will appear here automatically once their app goes live.</p><div style=\"display:inline-flex;flex-direction:column;gap:11px;margin-top:26px;text-align:left\">" + check + "</div></div>";
        }

        function mini(label, value, sub, trend, trendColor) { return '<div style="background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;box-shadow:0 1px 2px rgba(16,24,40,.04)"><div style="font-size:12px;color:var(--tx4);font-weight:500">' + label + '</div><div style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-top:8px;font-variant-numeric:tabular-nums">' + value + (trend ? ' <span style="font-size:12.5px;font-weight:600;color:' + trendColor + '">' + trend + "</span>" : "") + '</div><div style="font-size:12px;color:var(--tx4);margin-top:2px">' + sub + "</div></div>"; }
        var kpis = mini("MRR", inr(a.mrr), a.plan + " plan") +
          mini("GMV · 30d", inrK(a.gmv), "vs prior month", a.prev ? (up ? "+" : "") + pct + "%" : "", up ? "#16a34a" : "#dc2626") +
          mini("Active players", a.players + "/" + a.cap, over ? "over cap" : nearCap ? "near cap" : (a.cap ? Math.round(a.players / a.cap * 100) + "% of cap" : "—")) +
          mini("Adoption", a.activeDays + "/30", "active days");

        var mixKeys = Object.keys(a.mix).sort(function (x, y) { return a.mix[y] - a.mix[x]; });
        var mixTot = mixKeys.reduce(function (s, k) { return s + a.mix[k]; }, 0) || 1;
        var mixLegend = mixKeys.map(function (k) { return '<span style="display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2)"><span style="width:9px;height:9px;border-radius:3px;background:' + (CH[k] || "#b9b7ac") + '"></span>' + esc(k) + ' <b style="font-weight:600">' + Math.round(a.mix[k] / mixTot * 100) + "%</b></span>"; }).join("") || '<span style="font-size:12.5px;color:var(--tx4)">No channel bookings yet</span>';

        var activity = [
          ["payments", "#047857", "#ecfdf5", "Subscription " + (a.bill === "paid" ? "active" : a.bill), a.plan + " plan · " + inr(a.mrr), "billing"],
          ["sync", "var(--act)", "var(--acs)", "Channel sync", "Playo · " + Math.round(a.bookings * 0.4) + " bookings imported", agoH(a.lastH)],
          ["groups", "#b45309", "#fffbeb", "Coaching enquiries", a.enq + " leads this month", "30d"],
          ["trending_up", "#1d4ed8", "#eff6ff", "Gross volume " + (up ? "up" : "down") + " " + Math.abs(pct) + "%", "vs prior 30 days", ""],
        ].map(function (x) { return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bd3)"><div style="width:32px;height:32px;border-radius:9px;background:' + x[2] + ';display:flex;align-items:center;justify-content:center;flex:none"><span class="mi" style="font-size:18px;color:' + x[1] + '">' + x[0] + '</span></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">' + x[3] + '</div><div style="font-size:11.5px;color:var(--tx4)">' + x[4] + '</div></div><span style="font-size:11.5px;color:var(--tx5);white-space:nowrap">' + x[5] + "</span></div>"; }).join("");

        function facts(list) { return list.map(function (f) { return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd3)"><span style="font-size:12.5px;color:var(--tx3)">' + f[0] + '</span><span style="font-size:12.5px;font-weight:600;color:' + (f[2] || "#1a1d21") + ';text-align:right">' + f[1] + "</span></div>"; }).join(""); }
        var planFacts = facts([["Tier", esc(a.plan), ac], ["Subscription", inr(a.mrr) + " / mo"], ["Billing status", bs[2], bs[0]], ["Payment method", esc(a.method)], ["Next renewal", esc(a.renews), a.bill === "overdue" ? "#dc2626" : "#1a1d21"], ["Messaging · 30d", num(a.msgs) + " · " + inr(a.msgCost)]]);
        var adoptFacts = facts([["Active days", a.activeDays + " / 30"], ["Sessions · 30d", num(a.sessions)], ["Last activity", agoH(a.lastH)], ["App build", a.ver === "—" ? "—" : "v" + a.ver], ["Errors · 30d", String(a.errors), a.errors ? "#dc2626" : "#16a34a"]]);
        var bookFacts = facts([["Bookings · all time", num(a.totalBk)], ["Weekday / weekend", num(a.wkday) + " / " + num(a.wkend)], ["Court revenue · 90d", inr(a.courtRev)], ["Unique bookers", num(a.bookers)]]);

        function card(title, meta, inner) { return '<div style="background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:22px;box-shadow:0 1px 2px rgba(16,24,40,.04)"><div style="display:flex;align-items:center;justify-content:space-between"><h3 style="font-size:14px;font-weight:700;letter-spacing:-0.01em">' + title + "</h3>" + (meta ? '<span style="font-size:12px;color:var(--tx4)">' + meta + "</span>" : "") + "</div>" + inner + "</div>"; }
        return header +
          '<div class="kpis" style="margin-bottom:20px">' + kpis + "</div>" +
          '<div class="dgrid"><div style="display:flex;flex-direction:column;gap:20px">' +
            card("Gross volume", "weekly · last 8 weeks", '<div style="margin-top:18px">' + bars(a.weekly, 92, 8) + '</div><div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--tx5)"><span>8 wks ago</span><span>this week</span></div>') +
            card("Booking channels · 30d", "", '<div style="margin-top:18px">' + mixBar(a.mix, 12) + '</div><div style="display:flex;flex-wrap:wrap;gap:8px 20px;margin-top:16px">' + mixLegend + "</div>") +
            card("Recent activity", "", '<div style="margin-top:6px">' + activity + "</div>") +
          "</div><div style=\"display:flex;flex-direction:column;gap:20px\">" +
            card("Plan &amp; billing", "", '<div style="margin-top:6px">' + planFacts + "</div>") +
            card("Adoption · 30d", "", '<div style="margin-top:6px">' + adoptFacts + "</div>") +
            card("Court bookings", "", '<div style="margin-top:6px">' + bookFacts + "</div>") +
          "</div></div>";
      }

      /* ============ events (delegated; survive re-renders) ============ */
      document.addEventListener("click", function (e) {
        if (e.target.closest("[data-menu]")) { var app = document.querySelector(".app"); if (app) app.classList.toggle("nav-open"); return; }
        var nav = e.target.closest("[data-nav]");
        if (nav) { state.view = nav.getAttribute("data-nav"); state.sel = null; render(); scrollTop(); return; }
        var open = e.target.closest("[data-open]");
        if (open) { state.sel = open.getAttribute("data-open"); render(); scrollTop(); return; }
        if (e.target.closest("[data-back]")) { state.sel = null; render(); scrollTop(); return; }
        var sort = e.target.closest("[data-sort]");
        if (sort) { var k = sort.getAttribute("data-sort"); if (state.sortKey === k) state.sortDir = state.sortDir === "asc" ? "desc" : "asc"; else { state.sortKey = k; state.sortDir = k === "name" ? "asc" : "desc"; } render(); return; }
        if (e.target.closest("[data-signout]")) { localStorage.removeItem("am-session"); location.reload(); return; }
      });
      function scrollTop() { var s = document.getElementById("amScroll"); if (s) s.scrollTop = 0; }

      /* ============ boot ============ */
      render(); // shell first (empty), then hydrate
      rpc("get_channels").then(function (list) {
        if (list && list.length) { list.forEach(function (c) { if (CH[c.id] == null && c.color) CH[c.id] = c.color; }); }
      }).then(function () {
        return Promise.all([rpc("operator_portfolio"), rpc("platform_health"), rpc("reconcile_report").catch(function () { return null; })]);
      }).then(function (r) {
        var rows = r[0] || [], h = r[1] || {}, rec = r[2] || {};
        state.data = rows.map(mapAccount).sort(function (a, b) { return b.gmv - a.gmv; });
        state.health = Object.assign({}, h, { gap_count: (rec && rec.gap_count) || 0 });
        state.loaded = true;
        render();
      });
    })();
  </script>
</body>
</html>
